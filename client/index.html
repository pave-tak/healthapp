<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="운동 관리 - 매일 조금씩, 꾸준하게" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="운동" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>운동 관리</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body { min-height: 100vh; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #e2e8f0;
        overscroll-behavior: none;
        background:
          radial-gradient(ellipse 80% 60% at 10% 0%,   rgba(124,58,237,0.35),  transparent 60%),
          radial-gradient(ellipse 70% 50% at 95% 5%,   rgba(236,72,153,0.18),  transparent 60%),
          radial-gradient(ellipse 90% 70% at 50% 100%, rgba(56,189,248,0.22),  transparent 65%),
          linear-gradient(180deg, #0a0e1a 0%, #0f172a 45%, #1e1b4b 100%);
        background-attachment: fixed;
      }
      ::selection { background: rgba(165,180,252,0.35); color: #f8fafc; }
      /* date-input 네이티브 팝업 색 반전 (크롬) */
      input[type=date]::-webkit-calendar-picker-indicator { filter: invert(1) brightness(1.3); }
      input[type=number] { -moz-appearance: textfield; }
      input[type=number]::-webkit-inner-spin-button,
      input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
      /* 숨겨진 네이티브 날짜 인풋 — 트리거용 */
      .date-hidden { position: absolute; opacity: 0; pointer-events: none; width: 0; height: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch((err) =>
            console.warn("SW register failed:", err)
          );
        });
      }
    </script>
  </body>
</html>
