version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: workout_db
    environment:
      POSTGRES_DB: workout_db
      POSTGRES_USER: workout_user
      POSTGRES_PASSWORD: workout_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
